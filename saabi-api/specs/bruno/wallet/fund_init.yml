info:
  name: fund_init
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/wallet/fund/init"
  body:
    type: json
    data: |-
      {
        "phone_number": "{{phone_number}}",
        "amount": "5000.00"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
