name: starlight
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.1.0
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  heroine: ^0.7.2
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: any
  flutter_gen_runner:
  dart_mappable_builder: ^4.8.0
  envied_generator: ^1.3.4



flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/svgs/

  # fonts:
  # - family: Geist
  #   fonts:
  #     - asset: assets/fonts/Geist-VariableFont_wght.ttf

flutter_gen:
  output: lib/core/constants/src/assets/
  assets:
    exclude:
      - assets/fonts/**
  # Optional
  integrations:
    image: false