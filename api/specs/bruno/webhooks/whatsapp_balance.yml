info:
  name: whatsapp_balance
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/webhooks/twilio/whatsapp"
  body:
    type: formUrlEncoded
    formUrlEncoded:
      - name: From
        value: "whatsapp:{{phone_number}}"
      - name: Body
        value: "balance"
      - name: MessageSid
        value: "SMzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
