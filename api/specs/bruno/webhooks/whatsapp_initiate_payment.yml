info:
  name: whatsapp_initiate_payment
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/webhooks/twilio/whatsapp"
  body:
    type: formUrlEncoded
    formUrlEncoded:
      - name: From
        value: "whatsapp:{{phone_number}}"
      - name: Body
        value: "send 2500 naira to {{recipient_account_number}} GTBank"
      - name: MessageSid
        value: "SMxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
